<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mijn Fitness App</title>

  <!-- CSS (geen map!) -->
  style.css

  <!-- Chart.js -->
  https://cdn.jsdelivr.net/npm/chart.jsscript>
</head>
<body>
<main class="container">
  <h1 id="dateDisplay"></h1>

  <section>
    <h2>✅ Habits</h2>
    <ul id="habitList"></ul>
    <input id="newHabitInput" placeholder="Nieuwe habit" />
    <button id="addHabitBtn">Toevoegen</button>
  </section>

  <section>
    <h2>⚖️ Gewicht</h2>
    <input type="number" id="weightInput" step="0.1" />
    <canvas id="weightChart"></canvas>
  </section>

  <section>
    <h2>📸 Check-in</h2>
    <button id="openCheckinBtn">Check-in doen</button>
  </section>

  <section class="backup">
    <h2>💾 Backup</h2>
    <button id="exportBtn">Export</button>
    <input type="file" id="importInput" />
  </section>
</main>

<!-- JS bestanden (geen mappen!) -->
habits.jsscript>
weight.jsscript>
checkins.jsscript>
app.jsscript>

</body>
</html>
